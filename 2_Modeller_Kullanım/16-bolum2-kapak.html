<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bölüm 2 — Modeller & Kullanım</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAFAF7;
  --paper: #FFFFFF;
  --ink: #0A0A0A;
  --muted: #525252;
  --muted-2: #8A8A8A;
  --line-soft: #E5E4DE;
  --c1: #A855F7;
  --c2: #8B5CF6;
  --c3: #F59E0B;
  --pink: #EC4899;
  --orange: #F97316;
  --teal: #14B8A6;
  --blue: #3B82F6;
  --green: #22C55E;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); }

.poster {
  width: 100vw;
  height: 100vh;
  display: grid;
  grid-template-rows: 64px 1fr auto 60px;
  overflow: hidden;
}

/* Eyebrow */
.eyebrow-bar {
  display: flex; align-items: center;
  padding: 0 64px;
  border-bottom: 1.5px solid var(--ink);
  gap: 18px;
  background: var(--paper);
}
.eye-num {
  width: 32px; height: 32px;
  border: 1.5px solid var(--ink); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600; flex-shrink: 0;
}
.eye-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.18em; text-transform: uppercase;
}
.eye-rule { flex: 1; height: 1px; background: repeating-linear-gradient(90deg, var(--ink) 0 3px, transparent 3px 9px); opacity: 0.3; }
.eye-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--muted);
  letter-spacing: 0.14em; text-transform: uppercase;
}

/* Hero */
.hero { display: grid; grid-template-columns: 54% 46%; overflow: hidden; }

.title-col {
  display: flex; flex-direction: column; justify-content: center;
  padding: 52px 64px 52px 72px;
  background: var(--paper); position: relative;
}
.title-col::before {
  content: ""; position: absolute;
  left: 0; top: 52px; bottom: 52px;
  width: 5px; background: var(--c1);
}

.badge-row { display: flex; align-items: center; gap: 10px; margin-bottom: 36px; }
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; border: 1.5px solid var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
}
.badge.filled { background: var(--ink); color: var(--paper); }
.badge .dot { width: 8px; height: 8px; background: var(--c1); border-radius: 50%; }

.main-title {
  font-family: 'Inter Tight', sans-serif;
  font-size: clamp(52px, 6.5vw, 100px);
  font-weight: 900; line-height: 0.9;
  letter-spacing: -0.045em; color: var(--ink);
  text-transform: uppercase;
}
.main-title .accent-line { position: relative; display: inline-block; }
.main-title .accent-line::after {
  content: ""; position: absolute;
  left: -2px; right: -2px; bottom: 2px;
  height: 10px; background: var(--c1); z-index: -1; opacity: 0.85;
}

.title-meta { margin-top: 32px; display: flex; align-items: center; gap: 16px; }
.meta-line { flex: 1; height: 1.5px; background: var(--ink); max-width: 48px; }
.meta-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
}

/* Geometric column */
.geo-col {
  position: relative; background: var(--bg);
  border-left: 1.5px solid var(--ink); overflow: hidden;
}
.geo-col::before {
  content: ""; position: absolute; inset: 0;
  background:
    linear-gradient(var(--line-soft) 1px, transparent 1px) 0 0 / 44px 44px,
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px) 0 0 / 44px 44px;
  opacity: 0.5;
}

.shape { position: absolute; }
.s-circle-lg { width: 300px; height: 300px; border-radius: 50%; background: var(--c1); top: -70px; right: -50px; }
.s-circle-lg::after { content: ""; position: absolute; inset: 20px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3); }
.s-rect-amber { width: 170px; height: 80px; background: var(--c3); top: 50%; right: 60px; transform: translateY(-20px); }
.s-circle-pink { width: 110px; height: 110px; border-radius: 50%; background: var(--pink); bottom: 90px; left: 50px; }
.s-rect-orange { width: 36px; height: 180px; background: var(--orange); bottom: 0; right: 160px; }
.s-square-teal { width: 72px; height: 72px; background: var(--teal); bottom: 50px; right: 50px; }
.s-circle-outline { width: 160px; height: 160px; border-radius: 50%; border: 3px solid var(--blue); bottom: 40px; left: 110px; }
.s-dot-green { width: 18px; height: 18px; border-radius: 50%; background: var(--green); top: 130px; left: 64px; }
.s-hline { left: 0; right: 0; height: 1.5px; background: var(--ink); top: 50%; }
.s-rect-sm { width: 80px; height: 40px; background: var(--c2); top: 80px; left: 80px; }
.s-vline { top: 0; bottom: 0; width: 1.5px; background: var(--ink); left: 50%; opacity: 0.25; }

/* Chapter tiles */
.chapter-tiles { display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1.5px solid var(--ink); }
.tile {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px; text-decoration: none;
  color: var(--ink); background: var(--paper);
  border-right: 1.5px solid var(--ink);
  position: relative; overflow: hidden;
  transition: background 0.2s, transform 0.15s;
}
.tile:last-child { border-right: none; }
.tile::before {
  content: ""; position: absolute;
  left: 0; top: 0; bottom: 0; width: 5px; background: var(--tc);
}
.tile-num {
  font-family: 'Inter Tight', sans-serif;
  font-size: 28px; font-weight: 900; line-height: 1;
  letter-spacing: -0.04em; color: var(--tc); flex-shrink: 0;
}
.tile-info { display: flex; flex-direction: column; gap: 2px; }
.tile-bölüm {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted);
}
.tile-name {
  font-family: 'Inter Tight', sans-serif;
  font-size: 13px; font-weight: 800;
  letter-spacing: -0.02em; line-height: 1.2; color: var(--ink);
}
.tile:hover { transform: translateY(-2px); }

/* Footer */
.poster-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 64px; border-top: 1.5px solid var(--ink);
  background: var(--paper);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
}

.fs-btn {
  position: fixed; top: 14px; right: 14px;
  width: 36px; height: 36px; background: var(--paper);
  border: 1.5px solid var(--ink); border-radius: 10px; cursor: pointer; z-index: 300;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink); transition: all 0.15s;
}
.fs-btn:hover { background: var(--ink); color: var(--paper); }
.fs-btn svg { width: 14px; height: 14px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
.fadeUp { animation: fadeUp 0.6s cubic-bezier(.2,.7,.2,1) both; }
.scaleIn { animation: scaleIn 0.7s cubic-bezier(.2,.7,.2,1) both; }
.d1{animation-delay:0.05s} .d2{animation-delay:0.12s} .d3{animation-delay:0.22s}
.d4{animation-delay:0.30s} .d5{animation-delay:0.42s}

@media (max-width: 1100px) {
  .hero { grid-template-columns: 1fr; }
  .geo-col { display: none; }
  .chapter-tiles { grid-template-columns: repeat(3, 1fr); }
  .main-title { font-size: 52px; }
}
</style>
</head>
<body>

  <div class="hero">

  <div class="chapter-tiles fadeUp d4">

<script>
function toggleFS() {
  if (window.parent !== window) { window.parent.postMessage({ action: 'toggleFS' }, '*'); return; }
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') window.location.href = '17-model-haritasi.html';
  if (e.key === 'ArrowLeft')  window.location.href = '../1_Yapay_Zeka_Nasıl_Ogrenir/15-llm.html';
});
</script>
<script>
/* Sağ tık → parent index'e forward */
if (window.parent !== window) {
  document.addEventListener('contextmenu', function(e){
    e.preventDefault();
    window.parent.postMessage({action:'iframeContextmenu', x:e.clientX, y:e.clientY}, '*');
  });
  document.addEventListener('click', function(){
    window.parent.postMessage({action:'iframeClick'}, '*');
  });
}
</script>

</html>
